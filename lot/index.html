<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лот — WoT Shop</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="stylesheet" href="../css/main.css?v=__CACHE_VER__">
  <link rel="stylesheet" href="../css/gallery.css?v=__CACHE_VER__">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="./" class="logo">
        <span class="logo-text" id="brand-title"></span>
      </a>
      <nav class="breadcrumb" id="breadcrumb"></nav>
    </div>
  </header>

  <main class="container">
    <div class="lot-header" id="lot-header"></div>
    <div class="gallery-grid" id="gallery-grid">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </main>

  <!-- Лайтбокс -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-bg" id="lb-bg"></div>

    <!-- Миниатюры + счётчик СНИЗУ -->
    <div class="lb-thumbnails" id="lb-thumbnails">
      <div class="lb-tn-row" id="lb-tn-row"></div>
      <div class="lb-nav-counter" id="lb-counter">1 / 1</div>
    </div>

    <!-- Назад — левый верхний угол -->
    <button class="lb-back" id="lb-back" aria-label="Назад">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    </button>

    <!-- Закрыть — всегда видна -->
    <button class="lb-close" id="lb-close" aria-label="Закрыть">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- Стрелки -->
    <button class="lb-arrow lb-prev" id="lb-prev" aria-label="Предыдущее">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="lb-stage" id="lb-stage">
      <div class="lb-img-wrap" id="lb-img-wrap">
        <img id="lb-img" src="" alt="Скриншот аккаунта">
      </div>
    </div>

    <button class="lb-arrow lb-next" id="lb-next" aria-label="Следующее">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <!-- Тулбар СНИЗУ — только зум -->
    <div class="lb-toolbar" id="lb-toolbar">
      <div class="lb-toolbar-pill">
        <button class="lb-tool" id="lb-zoom-in" aria-label="Увеличить" title="+">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <div class="lb-divider"></div>
        <button class="lb-tool" id="lb-zoom-out" aria-label="Уменьшить" title="-">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Все аккаунты продаются через&nbsp;<img src="https://funpay.com/img/layout/logo-funpay.svg" alt="FunPay" class="funpay-logo-footer">&nbsp;— безопасная сделка гарантирована.</p>
  </footer>

  <script src="../js/resources.js?v=__CACHE_VER__"></script>
  <script src="../js/main.js?v=__CACHE_VER__"></script>
  <script src="../js/gallery.js?v=__CACHE_VER__"></script>
  <script>loadLot();</script>
</body>
</html>
