<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лот — WoT Shop</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/gallery.css">
</head>
<body>
  <div class="stars" id="stars"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">
        <span class="logo-icon">🎯</span>
        <span class="logo-text">WoT<span class="logo-accent">Shop</span></span>
      </a>
      <nav class="breadcrumb" id="breadcrumb"></nav>
    </div>
  </header>

  <main class="container">
    <div class="lot-header" id="lot-header">
      <!-- Генерируется JS -->
    </div>

    <!-- Превью изображений -->
    <div class="gallery-grid" id="gallery-grid">
      <div class="loading-spinner">
        <div class="spinner"></div>
      </div>
    </div>
  </main>

  <!-- Лайтбокс -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Просмотр изображения">
    <div class="lightbox-bg" id="lb-bg"></div>

    <button class="lb-close" id="lb-close" aria-label="Закрыть">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <button class="lb-arrow lb-prev" id="lb-prev" aria-label="Предыдущее">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="lb-stage" id="lb-stage">
      <div class="lb-img-wrap" id="lb-img-wrap">
        <img id="lb-img" src="" alt="Скриншот аккаунта">
      </div>
    </div>

    <button class="lb-arrow lb-next" id="lb-next" aria-label="Следующее">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <div class="lb-toolbar">
      <button class="lb-tool" id="lb-zoom-in" aria-label="Увеличить">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <button class="lb-tool" id="lb-zoom-out" aria-label="Уменьшить">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <button class="lb-tool" id="lb-zoom-reset" aria-label="Сбросить масштаб">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
      <span class="lb-counter" id="lb-counter">1 / 1</span>
    </div>

    <!-- Миниатюры -->
    <div class="lb-thumbnails" id="lb-thumbnails"></div>
  </div>

  <footer class="site-footer">
    <p>Все аккаунты продаются через FunPay — безопасная сделка гарантирована.</p>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../js/gallery.js"></script>
  <script>
    loadLot();
  </script>
</body>
</html>
